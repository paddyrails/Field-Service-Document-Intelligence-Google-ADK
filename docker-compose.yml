name: ritecare

services:
  # ── API Gateway ──────────────────────────────────────────────────────────────

  traefik:
    image: traefik:v3.0
    container_name: ritecare-gateway
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80" # all external HTTP traffic
      - "8888:8080" # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  # ── Kafka ─────────────────────────────────────────────────────────────────────

  kafka:
    image: apache/kafka:latest
    container_name: ritecare-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Appointment Service ───────────────────────────────────────────────────────

  appointment_service:
    build:
      context: ./services/appointment_service
      dockerfile: Dockerfile
    container_name: ritecare-appointment
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: appointment.booked
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENV: ${ENV:-production}
      APP_PORT: 8007
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.appointment.rule=PathPrefix(`/appointments`)"
      - "traefik.http.routers.appointment.entrypoints=web"
      - "traefik.http.services.appointment.loadbalancer.server.port=8007"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8007/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── Slack Gateway (outbound Socket Mode — not behind Traefik) ─────────────────

  slack_gateway:
    build:
      context: ./services/slack_gateway
      dockerfile: Dockerfile
    container_name: ritecare-slack-gateway
    environment:
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN}
      AGENT_BASE_URL: http://agent:8000
      BU5_BASE_URL: http://bu5_care_operations:8006
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      agent:
        condition: service_healthy
      bu5_care_operations:
        condition: service_healthy
    restart: unless-stopped

  # ── Auth Service ──────────────────────────────────────────────────────────────

  auth_service:
    build:
      context: ./services/auth_service
      dockerfile: Dockerfile
    container_name: ritecare-auth
    environment:
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-ritecare}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-60}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENV: ${ENV:-production}
      APP_PORT: 8010
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=PathPrefix(`/auth`)"
      - "traefik.http.routers.auth.entrypoints=web"
      - "traefik.http.services.auth.loadbalancer.server.port=8010"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── Agent ─────────────────────────────────────────────────────────────────────

  agent:
    build:
      context: ./services/agent_service
      dockerfile: Dockerfile
    container_name: ritecare-agent
    environment:
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-ritecare}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GOOGLE_CHAT_MODEL: ${GOOGLE_CHAT_MODEL:-gemini-2.5-flash}
      GOOGLE_EMBEDDING_MODEL: ${GOOGLE_EMBEDDING_MODEL:-gemini-embedding-001}
      RAG_TOP_K: ${RAG_TOP_K:-5}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      BU1_BASE_URL: http://bu1_onboarding:8001
      BU2_BASE_URL: http://bu2_sales_maintenance:8002
      BU3_BASE_URL: http://bu3_billing_subscription:8003
      BU4_BASE_URL: http://bu4_support_fulfillment:8004
      BU5_BASE_URL: http://bu5_care_operations:8006
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENV: ${ENV:-production}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agent.rule=PathPrefix(`/query`) || PathPrefix(`/health`)"
      - "traefik.http.routers.agent.entrypoints=web"
      - "traefik.http.services.agent.loadbalancer.server.port=8000"
    depends_on:
      bu1_onboarding:
        condition: service_healthy
      bu2_sales_maintenance:
        condition: service_healthy
      bu3_billing_subscription:
        condition: service_healthy
      bu4_support_fulfillment:
        condition: service_healthy
      bu5_care_operations:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── BU Services ───────────────────────────────────────────────────────────────

  bu1_onboarding:
    build:
      context: ./services/bu1_onboarding
      dockerfile: Dockerfile
    container_name: ritecare-bu1
    environment:
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-ritecare}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GOOGLE_EMBEDDING_MODEL: ${GOOGLE_EMBEDDING_MODEL:-gemini-embedding-001}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      RAG_CHUNK_SIZE: ${RAG_CHUNK_SIZE:-500}
      RAG_CHUNK_OVERLAP: ${RAG_CHUNK_OVERLAP:-50}
      RAG_TOP_K: ${RAG_TOP_K:-5}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENV: ${ENV:-production}
      APP_PORT: 8001
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bu1.rule=PathPrefix(`/bu1`)"
      - "traefik.http.routers.bu1.entrypoints=web"
      - "traefik.http.middlewares.bu1-strip.stripprefix.prefixes=/bu1"
      - "traefik.http.routers.bu1.middlewares=bu1-strip"
      - "traefik.http.services.bu1.loadbalancer.server.port=8001"
    volumes:
      - ./docs/bu1:/docs/bu1:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  bu2_sales_maintenance:
    build:
      context: ./services/bu2_sales_maintenance
      dockerfile: Dockerfile
    container_name: ritecare-bu2
    environment:
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-ritecare}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GOOGLE_EMBEDDING_MODEL: ${GOOGLE_EMBEDDING_MODEL:-gemini-embedding-001}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      RAG_CHUNK_SIZE: ${RAG_CHUNK_SIZE:-500}
      RAG_CHUNK_OVERLAP: ${RAG_CHUNK_OVERLAP:-50}
      RAG_TOP_K: ${RAG_TOP_K:-5}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENV: ${ENV:-production}
      APP_PORT: 8002
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bu2.rule=PathPrefix(`/bu2`)"
      - "traefik.http.routers.bu2.entrypoints=web"
      - "traefik.http.middlewares.bu2-strip.stripprefix.prefixes=/bu2"
      - "traefik.http.routers.bu2.middlewares=bu2-strip"
      - "traefik.http.services.bu2.loadbalancer.server.port=8002"
    volumes:
      - ./docs/bu2:/docs/bu2:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  bu3_billing_subscription:
    build:
      context: ./services/bu3_billing_subscription
      dockerfile: Dockerfile
    container_name: ritecare-bu3
    environment:
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-ritecare}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GOOGLE_EMBEDDING_MODEL: ${GOOGLE_EMBEDDING_MODEL:-gemini-embedding-001}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      RAG_CHUNK_SIZE: ${RAG_CHUNK_SIZE:-500}
      RAG_CHUNK_OVERLAP: ${RAG_CHUNK_OVERLAP:-50}
      RAG_TOP_K: ${RAG_TOP_K:-5}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENV: ${ENV:-production}
      APP_PORT: 8003
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bu3.rule=PathPrefix(`/bu3`)"
      - "traefik.http.routers.bu3.entrypoints=web"
      - "traefik.http.middlewares.bu3-strip.stripprefix.prefixes=/bu3"
      - "traefik.http.routers.bu3.middlewares=bu3-strip"
      - "traefik.http.services.bu3.loadbalancer.server.port=8003"
    volumes:
      - ./docs/bu3:/docs/bu3:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  bu4_support_fulfillment:
    build:
      context: ./services/bu4_support_fulfillment
      dockerfile: Dockerfile
    container_name: ritecare-bu4
    environment:
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-ritecare}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GOOGLE_EMBEDDING_MODEL: ${GOOGLE_EMBEDDING_MODEL:-gemini-embedding-001}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      RAG_CHUNK_SIZE: ${RAG_CHUNK_SIZE:-500}
      RAG_CHUNK_OVERLAP: ${RAG_CHUNK_OVERLAP:-50}
      RAG_TOP_K: ${RAG_TOP_K:-5}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENV: ${ENV:-production}
      APP_PORT: 8004
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bu4.rule=PathPrefix(`/bu4`)"
      - "traefik.http.routers.bu4.entrypoints=web"
      - "traefik.http.middlewares.bu4-strip.stripprefix.prefixes=/bu4"
      - "traefik.http.routers.bu4.middlewares=bu4-strip"
      - "traefik.http.services.bu4.loadbalancer.server.port=8004"
    volumes:
      - ./docs/bu4:/docs/bu4:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  bu5_care_operations:
    build:
      context: ./services/bu5_care_operations
      dockerfile: Dockerfile
    container_name: ritecare-bu5
    environment:
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-ritecare}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GOOGLE_EMBEDDING_MODEL: ${GOOGLE_EMBEDDING_MODEL:-gemini-embedding-001}
      RAG_TOP_K: ${RAG_TOP_K:-5}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      AGENT_BASE_URL: http://agent:8000
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: appointment.booked
      KAFKA_GROUP_ID: bu5-care-operations
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_MEMBERS_CHANNEL: ${SLACK_MEMBERS_CHANNEL:-rc-care-members}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENV: ${ENV:-production}
      APP_PORT: 8006
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bu5.rule=PathPrefix(`/bu5`)"
      - "traefik.http.routers.bu5.entrypoints=web"
      - "traefik.http.middlewares.bu5-strip.stripprefix.prefixes=/bu5"
      - "traefik.http.routers.bu5.middlewares=bu5-strip"
      - "traefik.http.services.bu5.loadbalancer.server.port=8006"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8006/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Ingestion Service ─────────────────────────────────────────────────────────

  ingestion_service:
    build:
      context: ./services/ingestion_service
      dockerfile: Dockerfile
    container_name: ritecare-ingestion
    environment:
      AIRFLOW_BASE_URL: http://airflow:8080
      AIRFLOW_USERNAME: ${AIRFLOW_USERNAME:-admin}
      AIRFLOW_PASSWORD: ${AIRFLOW_PASSWORD:-admin}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      UPLOAD_DIR: /docs/uploads
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENV: ${ENV:-production}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ingestion.rule=PathPrefix(`/ingest`)"
      - "traefik.http.routers.ingestion.entrypoints=web"
      - "traefik.http.services.ingestion.loadbalancer.server.port=8005"
    volumes:
      - uploads:/docs/uploads
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8005/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Airflow (admin only — keep its own port) ──────────────────────────────────

  airflow:
    image: apache/airflow:2.9.0
    container_name: ritecare-airflow
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_USERNAME:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_PASSWORD:-admin}
      PYTHONPATH: /opt/airflow/ingestion_service
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-ritecare}
      INGESTION_SERVICE_URL: http://ingestion_service:8005
      _PIP_ADDITIONAL_REQUIREMENTS: "google-genai pymongo pymongo[srv] pypdf tiktoken"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./services/ingestion_service:/opt/airflow/ingestion_service
      - uploads:/docs/uploads
      - airflow_db:/opt/airflow
    command: bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@ritecare.com || true && rm -f /opt/airflow/airflow-webserver.pid && airflow webserver --port 8080 & airflow scheduler & wait"
    restart: unless-stopped

volumes:
  uploads:
  airflow_db:
